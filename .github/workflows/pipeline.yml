name: Portfolio CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v3

      - name: Check index.html exists
        run: |
          if [ -f "index.html" ]; then
            echo "✅ index.html found!"
          else
            echo "❌ index.html missing!"
            exit 1
          fi

      - name: Validate HTML has DOCTYPE
        run: |
          if grep -q "<!DOCTYPE html>" index.html; then
            echo "✅ Valid HTML!"
          else
            echo "❌ Invalid HTML!"
            exit 1
          fi

      - name: Check resume PDF exists
        run: |
          if [ -f "Olajobi Haneef.pdf" ]; then
            echo "✅ Resume PDF found!"
          else
            echo "❌ Resume PDF missing!"
            exit 1
          fi

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v3

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
